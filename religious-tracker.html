<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Leader Tracker - Vimal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f1e8;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 60px 0; color: #333; }
        .header h1 { font-size: 3.5em; font-weight: 700; margin-bottom: 10px; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .table-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f8f8;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        tr:hover {
            background-color: #fafafa;
        }
        .footer { text-align: center; padding: 30px 0; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Religious Leader Tracker</h1>
            <p>A comprehensive tracker of the leaders of various religious denominations.</p>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="table-container">
            <table id="leaders-table">
                <thead>
                    <tr>
                        <th>Religion</th>
                        <th>Denomination</th>
                        <th>Leader</th>
                        <th>Since</th>
                        <th>Days in Charge</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>&copy; 2026 Vimal. All rights reserved.</p>
        </div>
    </div>

    <script>
        function calculateDays(dateString) {
            if (!dateString || dateString.toLowerCase() === 'n/a') return 'N/A';
            const startDate = new Date(dateString);
            const today = new Date();
            const diffTime = Math.abs(today - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            // If the date is in the future, return 0 or a negative value if preferred, 
            // but for a tracker of *current* leaders, we assume they are already in charge.
            if (startDate > today) return 0;
            
            return diffDays.toLocaleString();
        }

        async function loadTable() {
            try {
                const response = await fetch('leaders.csv');
                const data = await response.text();
                const rows = data.split('\n');
                const tableBody = document.getElementById('table-body');
                
                // Determine column indices from header
                const headers = rows[0].split(',').map(h => h.trim().toLowerCase());
                const religionIdx = headers.indexOf('religion');
                const sinceIdx = headers.indexOf('since');

                rows.slice(1).forEach(row => {
                    if (row.trim() === '') return;
                    const columns = row.split(',');
                    const tr = document.createElement('tr');
                    
                    // Iterate through the first 4 columns from CSV
                    for (let i = 0; i < 4; i++) {
                        const td = document.createElement('td');
                        let content = columns[i] ? columns[i].trim() : '';
                        
                        // Add cross to Christianity
                        if (i === religionIdx && content.toLowerCase() === 'christianity') {
                            content += ' ✝';
                        }
                        
                        td.textContent = content;
                        tr.appendChild(td);
                    }

                    // Calculate and add the "Days in Charge" column
                    const daysTd = document.createElement('td');
                    const sinceDate = columns[sinceIdx] ? columns[sinceIdx].trim() : '';
                    daysTd.textContent = calculateDays(sinceDate);
                    tr.appendChild(daysTd);
                    
                    tableBody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error loading CSV:', error);
            }
        }

        window.onload = loadTable;
    </script>
</body>
</html>
