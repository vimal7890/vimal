<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Religious Leader Tracker - Vimal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f1e8;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 60px 0; color: #333; }
        .header h1 { font-size: 3.5em; font-weight: 700; margin-bottom: 10px; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #333;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .table-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow-x: auto;
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f8f8f8;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        .clickable-header {
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }
        .clickable-header:hover {
            background-color: #e0e0e0;
        }
        tr:hover {
            background-color: #fafafa;
        }
        tr.christian-row:hover {
            background-color: #e3f2fd !important; /* Light blue tint */
        }
        .footer { text-align: center; padding: 30px 0; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Religious Leader Tracker</h1>
            <p>A comprehensive tracker of the leaders of various religious denominations.</p>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>

        <div class="table-container">
            <table id="leaders-table">
                <thead>
                    <tr>
                        <th>Religion</th>
                        <th>Denomination</th>
                        <th>Leader</th>
                        <th>Since</th>
                        <th id="time-header" class="clickable-header">Days in Charge ↕</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>

        <div class="footer">
            <p>&copy; 2026 Vimal. All rights reserved.</p>
        </div>
    </div>

    <script>
        let currentMode = 'days'; // 'days', 'hours', 'minutes', 'seconds'
        const modes = ['days', 'hours', 'minutes', 'seconds'];
        let leadersData = [];

        function formatValue(value, mode) {
            if (isNaN(value)) return '';
            return Math.floor(value).toLocaleString() + (mode === 'days' ? '' : '');
        }

        function hasExactDatePrecision(sinceDateStr) {
            if (!sinceDateStr) return false;
            return /^[A-Za-z]+\s+\d{1,2}(st|nd|rd|th)?\s+\d{4}$/.test(sinceDateStr.trim());
        }

        function calculateTime(sinceDateStr) {
            if (!sinceDateStr || sinceDateStr.toLowerCase() === 'n/a' || !hasExactDatePrecision(sinceDateStr)) {
                return NaN;
            }
            
            // Only calculate live time for rows with a fully specified day.
            const cleanDateStr = sinceDateStr.replace(/(\d+)(st|nd|rd|th)/, '$1');
            const startDate = new Date(cleanDateStr + ' 12:00:00 UTC');
            const now = new Date();
            const diffMs = now - startDate;
            
            if (diffMs < 0) return 0;

            switch (currentMode) {
                case 'days':
                    return diffMs / (1000 * 60 * 60 * 24);
                case 'hours':
                    return diffMs / (1000 * 60 * 60);
                case 'minutes':
                    return diffMs / (1000 * 60);
                case 'seconds':
                    return diffMs / 1000;
                default:
                    return diffMs / (1000 * 60 * 60 * 24);
            }
        }

        function updateTableValues() {
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach((row, index) => {
                const timeCell = row.cells[4];
                const sinceDate = leadersData[index].since;
                timeCell.textContent = formatValue(calculateTime(sinceDate), currentMode);
            });
            
            const header = document.getElementById('time-header');
            const modeLabels = {
                'days': 'Days in Charge ↕',
                'hours': 'Hours in Charge ↕',
                'minutes': 'Minutes in Charge ↕',
                'seconds': 'Seconds in Charge ↕'
            };
            header.textContent = modeLabels[currentMode];
        }

        async function loadTable() {
            try {
                const response = await fetch('leaders.csv');
                const csvText = await response.text();
                const lines = csvText.split('\n');
                const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                
                const religionIdx = headers.indexOf('religion');
                const sinceIdx = headers.indexOf('since');
                const tableBody = document.getElementById('table-body');

                lines.slice(1).forEach(line => {
                    if (line.trim() === '') return;
                    const columns = line.split(',');
                    const religion = columns[religionIdx] ? columns[religionIdx].trim() : '';
                    const since = columns[sinceIdx] ? columns[sinceIdx].trim() : '';
                    
                    leadersData.push({ since, religion });

                    const tr = document.createElement('tr');
                    if (religion.toLowerCase() === 'christianity') {
                        tr.classList.add('christian-row');
                    }

                    for (let i = 0; i < 4; i++) {
                        const td = document.createElement('td');
                        let content = columns[i] ? columns[i].trim() : '';
                        if (i === religionIdx && content.toLowerCase() === 'christianity') {
                            content += ' ✝';
                        }
                        td.textContent = content;
                        tr.appendChild(td);
                    }

                    const timeTd = document.createElement('td');
                    tr.appendChild(timeTd);
                    tableBody.appendChild(tr);
                });

                updateTableValues();
                
                // Refresh values every second if in seconds/minutes mode
                setInterval(() => {
                    if (currentMode === 'seconds' || currentMode === 'minutes' || currentMode === 'hours') {
                        updateTableValues();
                    }
                }, 1000);

            } catch (error) {
                console.error('Error loading CSV:', error);
            }
        }

        document.getElementById('time-header').addEventListener('click', () => {
            const nextIdx = (modes.indexOf(currentMode) + 1) % modes.length;
            currentMode = modes[nextIdx];
            updateTableValues();
        });

        window.onload = loadTable;
    </script>
</body>
</html>
