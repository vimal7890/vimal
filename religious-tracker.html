        function formatValue(value) {
            if (isNaN(value)) return '';
            return Math.floor(value).toLocaleString();
        }

        function parseCSV(csvText) {
            const rows = [];
            let row = [];
            let value = '';
            let inQuotes = false;

            for (let i = 0; i < csvText.length; i++) {
                const char = csvText[i];
                const nextChar = csvText[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        value += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    row.push(value);
                    value = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') {
                        i++;
                    }
                    row.push(value);
                    if (row.some(cell => cell !== '')) {
                        rows.push(row);
                    }
                    row = [];
                    value = '';
                } else {
                    value += char;
                }
            }

            if (value !== '' || row.length > 0) {
                row.push(value);
                if (row.some(cell => cell !== '')) {
                    rows.push(row);
                }
            }

            return rows;
        }

        function hasExactDatePrecision(sinceDateStr) {
            if (!sinceDateStr) return false;
            return /^[A-Za-z]+\s+\d{1,2}(st|nd|rd|th)?\s+\d{4}$/.test(sinceDateStr.trim());
        }

        function calculateDays(sinceDateStr) {
            if (!sinceDateStr || sinceDateStr.toLowerCase() === 'n/a' || !hasExactDatePrecision(sinceDateStr)) {
                return NaN;
            }
            
            // Only calculate live time for rows with a fully specified day.
            const cleanDateStr = sinceDateStr.replace(/(\d+)(st|nd|rd|th)/, '$1');
            const startDate = new Date(cleanDateStr + ' 12:00:00 UTC');
            const now = new Date();
            const diffMs = now - startDate;
            
            if (diffMs < 0) return 0;
            return diffMs / (1000 * 60 * 60 * 24);
        }

        function getDenominationPageMatch({ denomination, subDenomination, subDenomination2 }) {
            const candidates = [
                { label: subDenomination2, column: 'subDenomination2' },
                { label: subDenomination && subDenomination2 ? `${subDenomination} (${subDenomination2})` : '', column: 'subDenomination2' },
                { label: subDenomination, column: 'subDenomination' },
                { label: denomination, column: 'denomination' }
            ];

            for (const candidate of candidates) {
                if (!candidate.label) continue;

                const page = denominationPages[candidate.label];
                if (page) {
                    return { page, column: candidate.column };
                }
            }

            return null;
        }

        function getMembershipDataMatch({ denomination, subDenomination, subDenomination2 }) {
            const candidates = [
                subDenomination2,
                subDenomination && subDenomination2 ? `${subDenomination} (${subDenomination2})` : '',
                subDenomination,
                denomination
            ];

            for (const candidate of candidates) {
                if (!candidate) continue;
                const match = membershipData[candidate];
                if (match) {
                    return match;
                }
            }

            return null;
        }

        function getEasternOrthodoxyDisplayName(subDenomination, churchName) {
            if (subDenomination !== 'Eastern Orthodoxy') {
                return churchName;
            }

            const flag = easternOrthodoxyFlags[churchName];
            return flag ? `${churchName} ${flag}` : churchName;
        }

        function updateTableValues() {
            const rows = document.querySelectorAll('#table-body tr');
            rows.forEach((row, index) => {
                const timeCell = row.cells[row.cells.length - 1];
                const sinceDate = leadersData[index].since;
                timeCell.textContent = formatValue(calculateDays(sinceDate));
            });
        }

        function updateHeaderArrow() {
            const header = document.getElementById('time-header');
            if (sortDirection === 'asc') {
                header.textContent = 'Days in Charge ↑';
            } else if (sortDirection === 'desc') {
                header.textContent = 'Days in Charge ↓';
            } else {
                header.textContent = 'Days in Charge ↕';
            }
        }

        function sortTable() {
            // Toggle sort direction
            if (sortDirection === null || sortDirection === 'desc') {
                sortDirection = 'asc';
            } else {
                sortDirection = 'desc';
            }

            const tableBody = document.getElementById('table-body');
            const rows = Array.from(tableBody.querySelectorAll('tr'));

            // Build an array of { row, index, days } so we can sort
            const rowsWithData = rows.map((row, index) => ({
                row,
                originalIndex: index,
                days: calculateDays(leadersData[index].since)
            }));

            rowsWithData.sort((a, b) => {
                const aVal = isNaN(a.days) ? -Infinity : a.days;
                const bVal = isNaN(b.days) ? -Infinity : b.days;
                return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
            });

            // Reorder leadersData and DOM rows
            const newLeadersData = rowsWithData.map(r => leadersData[r.originalIndex]);
            leadersData = newLeadersData;

            // Re-append rows in sorted order (moves them in the DOM)
            rowsWithData.forEach(r => tableBody.appendChild(r.row));

            updateTableValues();
            updateHeaderArrow();
        }

        async function loadTable() {
            try {
                const [csvResponse, membershipResponse] = await Promise.all([
                    fetch(`leaders.csv?v=${Date.now()}`, { cache: 'no-store' }),
                    fetch(`membership-data.json?v=${Date.now()}`, { cache: 'no-store' })
                ]);
                const csvText = await csvResponse.text();
                membershipData = await membershipResponse.json();
                const rows = parseCSV(csvText);
                const headers = (rows[0] || []).map(h => h.trim().toLowerCase());
                
                const religionIdx = headers.indexOf('religion');
                const denominationIdx = headers.indexOf('denomination');
                const subDenominationIdx = headers.indexOf('sub denomination');
                const subDenomination2Idx = headers.indexOf('sub denomination 2');
                const leaderIdx = headers.indexOf('leader');
                const sinceIdx = headers.indexOf('since');
                const tableBody = document.getElementById('table-body');

                rows.slice(1).forEach(columns => {
                    const religion = columns[religionIdx] ? columns[religionIdx].trim() : '';
                    const denomination = columns[denominationIdx] ? columns[denominationIdx].trim() : '';
                    const subDenomination = columns[subDenominationIdx] ? columns[subDenominationIdx].trim() : '';
                    const subDenomination2 = columns[subDenomination2Idx] ? columns[subDenomination2Idx].trim() : '';

                    if (subDenomination2 === 'Cooperative Baptist Fellowship') {
                        return;
                    }

                    const since = columns[sinceIdx] ? columns[sinceIdx].trim() : '';
                    const denominationPageMatch = getDenominationPageMatch({
                        denomination,
                        subDenomination,
                        subDenomination2
                    });
                    const membershipMatch = getMembershipDataMatch({
                        denomination,
                        subDenomination,
                        subDenomination2
                    });
                    
                    leadersData.push({ since, religion });

                    const tr = document.createElement('tr');
                    if (religion.toLowerCase() === 'christianity') {
                        tr.classList.add('christian-row');
                    } else if (religion.toLowerCase() === 'judaism') {
                        tr.classList.add('judaism-row');
                    } else if (religion.toLowerCase() === 'buddhism') {
                        tr.classList.add('buddhist-row');
                    } else if (religion.toLowerCase() === 'hinduism') {
                        tr.classList.add('hindu-row');
                    } else if (religion.toLowerCase() === 'islam') {
                        tr.classList.add('islam-row');
                    }

                    const displayCells = [
                        { type: 'csv', index: religionIdx },
                        { type: 'csv', index: denominationIdx },
                        { type: 'csv', index: subDenominationIdx },
                        { type: 'csv', index: subDenomination2Idx },
                        { type: 'members', content: membershipMatch?.members || '' },
                        { type: 'source', content: membershipMatch?.source || '' },
                        { type: 'csv', index: leaderIdx },
                        { type: 'csv', index: sinceIdx },
                    ];

                    for (const cell of displayCells) {
                        const td = document.createElement('td');
                        let content = cell.type === 'csv'
                            ? (columns[cell.index] ? columns[cell.index].trim() : '')
                            : cell.content;
                        if (cell.type === 'csv' && cell.index === religionIdx) {
                            const religionSymbol = religionSymbols[content.toLowerCase()];
                            if (religionSymbol) {
                                content += ` ${religionSymbol}`;
                            }
                        }
                        if (cell.type === 'csv' && cell.index === subDenomination2Idx) {
                            content = getEasternOrthodoxyDisplayName(subDenomination, content);
                        }
                        if (cell.type === 'members') {
                            td.classList.add('members-cell');
                        }
                        if (cell.type === 'source') {
                            td.classList.add('source-cell');
                        }
                        const shouldLinkSubDenomination = cell.type === 'csv' && cell.index === subDenominationIdx && denominationPageMatch?.column === 'subDenomination';
                        const shouldLinkSubDenomination2 = cell.type === 'csv' && cell.index === subDenomination2Idx && denominationPageMatch?.column === 'subDenomination2';
                        const shouldLinkDenomination = cell.type === 'csv' && cell.index === denominationIdx && denominationPageMatch?.column === 'denomination';

                        if ((shouldLinkSubDenomination || shouldLinkSubDenomination2 || shouldLinkDenomination) && denominationPageMatch?.page) {
                            const link = document.createElement('a');
                            link.href = denominationPageMatch.page;
                            link.className = 'denomination-link';
                            link.textContent = content;
                            td.appendChild(link);
                        } else {
                            td.textContent = content;
                        }
                        tr.appendChild(td);
                    }

                    const timeTd = document.createElement('td');
                    tr.appendChild(timeTd);
                    tableBody.appendChild(tr);
                });

                updateTableValues();

            } catch (error) {
                console.error('Error loading CSV:', error);
            }
        }

        document.getElementById('time-header').addEventListener('click', sortTable);

        window.onload = loadTable;
    </script>
    <script src="home-button-loader.js" data-home-href="index.html" defer></script>
</body>
</html>
