<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song of the Month Archive - Vimal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f1e8;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: clamp(14px, 3.8vw, 20px); }
        .home-button {
            position: fixed;
            top: clamp(12px, 2vw, 22px);
            left: clamp(12px, 2vw, 22px);
            z-index: 1000;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(51, 51, 51, 0.2);
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1;
            backdrop-filter: blur(2px);
            transition: color 0.2s ease, border-color 0.2s ease, transform 0.2s ease, background-color 0.2s ease;
        }
        .home-button svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .home-button:hover,
        .home-button:focus-visible {
            color: #d93025;
            border-color: rgba(217, 48, 37, 0.45);
            background: #fff;
            transform: translateY(-1px);
            text-decoration: none;
        }
        .home-button:focus-visible {
            outline: 2px solid rgba(217, 48, 37, 0.55);
            outline-offset: 2px;
        }
        .header { text-align: center; padding: clamp(42px, 8vw, 60px) 0; color: #333; }
        .header h1 { font-size: clamp(2rem, 8vw, 2.5rem); font-weight: 700; margin-bottom: 10px; }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #333;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease, transform 0.2s ease;
            transform-origin: left center;
        }
        .back-link:hover,
        .back-link:focus-visible {
            color: #d93025;
            transform: scale(1.04);
            text-decoration: underline;
        }
        .content {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            margin: 0 auto 40px;
            padding: clamp(26px, 6vw, 50px) clamp(16px, 5vw, 60px);
            text-align: center;
            color: #666;
        }
        .song-item {
            margin-bottom: clamp(24px, 4vw, 30px);
            padding-bottom: clamp(24px, 4vw, 30px);
            border-bottom: 1px solid #f0f0f0;
        }
        .song-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .song-widget-shell {
            position: relative;
            display: grid;
            grid-template-columns: clamp(16px, 4.7vw, 36px) minmax(0, 1fr) clamp(16px, 4.7vw, 36px);
            gap: clamp(5px, 1.8vw, 10px);
            align-items: stretch;
            max-width: min(100%, 860px);
            margin: 0 auto;
            isolation: isolate;
        }
        .song-widget-shell::before {
            content: "";
            position: absolute;
            inset: 16px -8px;
            border-radius: 28px;
            background:
                radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0) 44%),
                linear-gradient(180deg, rgba(202, 245, 255, 0.34) 0%, rgba(110, 196, 240, 0.18) 50%, rgba(101, 218, 188, 0.24) 100%);
            filter: blur(18px);
            opacity: 0.88;
            z-index: 0;
            pointer-events: none;
        }
        .song-embed {
            width: 100%;
            min-height: 152px;
            min-width: 0;
            position: relative;
            z-index: 2;
            border-radius: 18px;
            overflow: hidden;
            box-shadow:
                0 18px 34px rgba(80, 104, 138, 0.14),
                inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }
        .song-embed iframe {
            display: block;
            width: 100% !important;
            border-radius: 18px;
        }
        .song-visualizer {
            width: 100%;
            min-height: 152px;
            height: 100%;
            display: block;
            align-self: stretch;
            position: relative;
            z-index: 1;
            border-radius: 18px;
            background:
                radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.56) 18%, rgba(255, 255, 255, 0) 44%),
                linear-gradient(180deg, rgba(239, 253, 255, 0.98) 0%, rgba(177, 229, 248, 0.86) 34%, rgba(96, 182, 231, 0.74) 68%, rgba(110, 213, 186, 0.82) 100%);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                inset 0 -10px 18px rgba(34, 115, 164, 0.2),
                0 0 0 1px rgba(181, 235, 255, 0.82),
                0 12px 26px rgba(67, 117, 161, 0.2),
                0 0 18px rgba(136, 226, 255, 0.28);
            filter: saturate(1.08);
            opacity: 0.78;
            transition: opacity 0.28s ease, box-shadow 0.28s ease, filter 0.28s ease, transform 0.28s ease;
            pointer-events: none;
        }
        .song-item:hover .song-visualizer,
        .song-item:focus-within .song-visualizer {
            opacity: 1;
            filter: saturate(1.18);
            transform: translateY(-1px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.95),
                inset 0 -10px 18px rgba(34, 115, 164, 0.22),
                0 0 0 1px rgba(190, 241, 255, 0.9),
                0 15px 30px rgba(64, 120, 168, 0.24),
                0 0 24px rgba(136, 232, 255, 0.4);
        }
        .song-description {
            color: #666;
            margin-top: 15px;
            font-size: clamp(0.95rem, 3.4vw, 1rem);
        }
        @media (max-width: 640px) {
            .home-button {
                gap: 6px;
                padding: 7px 12px;
                font-size: 0.9rem;
            }
            .home-button svg {
                width: 14px;
                height: 14px;
            }
            .container {
                padding: 14px;
            }
            .back-link {
                margin-top: 16px;
            }
        }
        @media (max-width: 420px) {
            .song-widget-shell {
                grid-template-columns: 12px minmax(0, 1fr) 12px;
                gap: 4px;
            }
            .song-visualizer {
                opacity: 0.42;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-button" aria-label="Go to home page">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 3.2a1 1 0 0 1 .64.23l8 6.6a1 1 0 0 1 .36.77v9.9a1 1 0 0 1-1 1h-5.5a1 1 0 0 1-1-1v-4h-3v4a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-9.9a1 1 0 0 1 .36-.77l8-6.6A1 1 0 0 1 12 3.2z"/>
        </svg>
        <span>Home</span>
    </a>
    <div class="container">
        <div class="header">
            <h1>Song of the Month Archive</h1>
            <a href="index.html" class="back-link">← Back to home</a>
        </div>

        <div class="content">
            <div class="song-item">
                <div class="song-widget-shell">
                    <canvas class="song-visualizer" width="36" height="152" aria-hidden="true"></canvas>
                    <div class="song-embed">
                        <iframe data-testid="embed-iframe" style="border-radius:18px" src="https://open.spotify.com/embed/track/0IdbV9Iju5YrauWOLrtLbv?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                    </div>
                    <canvas class="song-visualizer" width="36" height="152" aria-hidden="true"></canvas>
                </div>
                <p class="song-description">Miracle of Miracles from Fiddler on the Roof.</p>
            </div>
            <div class="song-item">
                <div class="song-widget-shell">
                    <canvas class="song-visualizer" width="36" height="152" aria-hidden="true"></canvas>
                    <div class="song-embed">
                        <iframe data-testid="embed-iframe" style="border-radius:18px" src="https://open.spotify.com/embed/track/7eBTI6g6HKaCYGP53YlygC?utm_source=generator" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                    </div>
                    <canvas class="song-visualizer" width="36" height="152" aria-hidden="true"></canvas>
                </div>
                <p class="song-description">Dil Lageya by Veronica featuring Rishi Rich. Peak Noughties Nostalgia</p>
            </div>
        </div>
    </div>
    <script>
        const archiveVisualizerItems = Array.from(document.querySelectorAll('.song-widget-shell'))
            .map((shell, index) => {
                const canvases = shell.querySelectorAll('.song-visualizer');
                const embed = shell.querySelector('.song-embed');
                const iframe = embed ? embed.querySelector('iframe') : null;

                return {
                    shell,
                    embed,
                    iframe,
                    energy: 0.18,
                    targetEnergy: 0.18,
                    phaseOffset: index * 0.9,
                    rails: Array.from(canvases).map((canvas, canvasIndex) => ({
                        canvas,
                        ctx: canvas.getContext('2d'),
                        direction: canvasIndex === 0 ? -1 : 1,
                    })),
                };
            })
            .filter((item) => item.embed && item.rails.every((rail) => rail.canvas && rail.ctx));

        function pseudoNoise(seed) {
            const value = Math.sin(seed * 12.9898) * 43758.5453;
            return value - Math.floor(value);
        }

        function queueArchiveVisualizerResize() {
            window.requestAnimationFrame(resizeArchiveVisualizers);
        }

        function resizeArchiveVisualizers() {
            const ratio = window.devicePixelRatio || 1;

            archiveVisualizerItems.forEach((item) => {
                item.rails.forEach((rail) => {
                    const width = Math.max(1, Math.floor(rail.canvas.clientWidth || rail.canvas.width));
                    const height = Math.max(1, Math.floor(rail.canvas.clientHeight || item.embed.clientHeight || 152));
                    rail.canvas.width = Math.max(1, Math.floor(width * ratio));
                    rail.canvas.height = Math.max(1, Math.floor(height * ratio));
                    rail.ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
                    rail.ctx.lineCap = 'round';
                });
            });
        }

        function traceRoundedRect(ctx, x, y, width, height, radius) {
            const safeRadius = Math.min(radius, width / 2, height / 2);
            ctx.beginPath();
            ctx.moveTo(x + safeRadius, y);
            ctx.arcTo(x + width, y, x + width, y + height, safeRadius);
            ctx.arcTo(x + width, y + height, x, y + height, safeRadius);
            ctx.arcTo(x, y + height, x, y, safeRadius);
            ctx.arcTo(x, y, x + width, y, safeRadius);
            ctx.closePath();
        }

        function drawArchiveRail(item, rail, t) {
            const width = rail.canvas.clientWidth;
            const height = rail.canvas.clientHeight;

            if (!width || !height) {
                return;
            }

            rail.ctx.clearRect(0, 0, width, height);

            rail.ctx.save();
            traceRoundedRect(rail.ctx, 0.5, 0.5, width - 1, height - 1, Math.min(18, width * 0.45));
            rail.ctx.clip();

            const outwardEdge = rail.direction < 0 ? 0 : width;
            const innerEdge = rail.direction < 0 ? width - 2 : 2;
            const energyScale = 0.22 + item.energy * 0.9;
            const ambientGradient = rail.ctx.createLinearGradient(innerEdge, 0, outwardEdge, height);
            ambientGradient.addColorStop(0, 'rgba(255, 255, 255, 0.32)');
            ambientGradient.addColorStop(0.22, 'rgba(197, 245, 255, 0.24)');
            ambientGradient.addColorStop(0.62, 'rgba(96, 195, 255, 0.16)');
            ambientGradient.addColorStop(1, 'rgba(44, 135, 198, 0.04)');
            rail.ctx.fillStyle = ambientGradient;
            rail.ctx.fillRect(0, 0, width, height);

            const topGlow = rail.ctx.createRadialGradient(width * 0.5, height * 0.08, 0, width * 0.5, height * 0.08, height * 0.8);
            topGlow.addColorStop(0, `rgba(255, 255, 255, ${(0.24 + item.energy * 0.22).toFixed(3)})`);
            topGlow.addColorStop(0.34, `rgba(188, 241, 255, ${(0.16 + item.energy * 0.16).toFixed(3)})`);
            topGlow.addColorStop(1, 'rgba(188, 241, 255, 0)');
            rail.ctx.fillStyle = topGlow;
            rail.ctx.fillRect(0, 0, width, height);

            for (let i = 0; i < 3; i += 1) {
                const beamCenter = ((t * (15 + i * 3.2)) + item.phaseOffset * 26 + i * height * 0.31) % (height + 66) - 33;
                const beamGradient = rail.ctx.createLinearGradient(0, beamCenter - 24, 0, beamCenter + 24);
                beamGradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                beamGradient.addColorStop(0.5, `rgba(255, 255, 255, ${(0.04 + energyScale * 0.08).toFixed(3)})`);
                beamGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                rail.ctx.fillStyle = beamGradient;
                rail.ctx.fillRect(0, beamCenter - 28, width, 56);
            }

            rail.ctx.save();
            rail.ctx.shadowColor = 'rgba(123, 234, 255, 0.45)';
            rail.ctx.shadowBlur = 10 + item.energy * 10;

            for (let i = 0; i < 4; i += 1) {
                const ribbonRatio = i / 3;
                const baseY = height * (0.14 + ribbonRatio * 0.24);
                const sway = Math.sin((t * 2.1) + item.phaseOffset + ribbonRatio * 4.2 + rail.direction * 0.7);
                const crest = Math.sin((t * 4.5) + item.phaseOffset * 0.8 + ribbonRatio * 6.7 + rail.direction * 1.1);
                const extent = (0.34 + 0.22 * Math.sin((t * 1.5) + item.phaseOffset * 0.5 + ribbonRatio * 3.1)) * energyScale;
                const outerX = rail.direction < 0
                    ? innerEdge - (width * (0.34 + extent))
                    : innerEdge + (width * (0.34 + extent));
                const controlX1 = rail.direction < 0 ? innerEdge - width * 0.18 : innerEdge + width * 0.18;
                const controlX2 = rail.direction < 0 ? innerEdge - width * (0.3 + extent * 0.44) : innerEdge + width * (0.3 + extent * 0.44);
                const endY = baseY + sway * height * 0.1;
                const controlY1 = baseY - height * (0.08 + 0.03 * crest);
                const controlY2 = endY + height * (0.1 + 0.04 * sway);
                const ribbonGradient = rail.ctx.createLinearGradient(innerEdge, baseY, outerX, endY);
                ribbonGradient.addColorStop(0, `rgba(255, 255, 255, ${(0.8 - ribbonRatio * 0.1).toFixed(3)})`);
                ribbonGradient.addColorStop(0.3, `rgba(194, 247, 255, ${(0.7 - ribbonRatio * 0.08).toFixed(3)})`);
                ribbonGradient.addColorStop(0.68, `rgba(109, 220, 255, ${(0.4 - ribbonRatio * 0.05).toFixed(3)})`);
                ribbonGradient.addColorStop(1, 'rgba(102, 220, 181, 0)');
                rail.ctx.strokeStyle = ribbonGradient;
                rail.ctx.lineWidth = 1.45 + item.energy * 0.9 - ribbonRatio * 0.18;
                rail.ctx.beginPath();
                rail.ctx.moveTo(innerEdge, baseY);
                rail.ctx.bezierCurveTo(controlX1, controlY1, controlX2, controlY2, outerX, endY);
                rail.ctx.stroke();
            }

            rail.ctx.restore();

            for (let i = 0; i < 4; i += 1) {
                const travel = ((t * (13 + i * 2.1)) + item.phaseOffset * 22 + i * height * 0.24) % (height + 42) - 21;
                const drift = 0.18 + pseudoNoise((i * 17) + item.phaseOffset * 11) * 0.34;
                const x = rail.direction < 0 ? width * (0.7 - drift) : width * (0.3 + drift);
                const radius = 2.4 + i * 0.32 + item.energy * 0.7;
                const orbGradient = rail.ctx.createRadialGradient(x - radius * 0.25, travel - radius * 0.35, 0, x, travel, radius * 1.9);
                orbGradient.addColorStop(0, `rgba(255, 255, 255, ${(0.68 - i * 0.07).toFixed(3)})`);
                orbGradient.addColorStop(0.48, `rgba(171, 241, 255, ${(0.28 + item.energy * 0.18).toFixed(3)})`);
                orbGradient.addColorStop(1, 'rgba(171, 241, 255, 0)');
                rail.ctx.fillStyle = orbGradient;
                rail.ctx.beginPath();
                rail.ctx.arc(x, travel, radius * 1.9, 0, Math.PI * 2);
                rail.ctx.fill();
            }

            rail.ctx.strokeStyle = `rgba(255, 255, 255, ${(0.28 + item.energy * 0.36).toFixed(3)})`;
            rail.ctx.lineWidth = 1;
            rail.ctx.beginPath();
            rail.ctx.moveTo(innerEdge, 10);
            rail.ctx.lineTo(innerEdge, height - 10);
            rail.ctx.stroke();

            rail.ctx.restore();
        }

        function animateArchiveVisualizers() {
            const t = performance.now() * 0.001;

            archiveVisualizerItems.forEach((item) => {
                item.energy += (item.targetEnergy - item.energy) * 0.08;
                item.rails.forEach((rail) => drawArchiveRail(item, rail, t));
            });

            requestAnimationFrame(animateArchiveVisualizers);
        }

        archiveVisualizerItems.forEach((item) => {
            item.shell.addEventListener('mouseenter', () => {
                item.targetEnergy = 0.42;
            });
            item.shell.addEventListener('mouseleave', () => {
                item.targetEnergy = 0.18;
            });
            item.shell.addEventListener('focusin', () => {
                item.targetEnergy = 0.42;
            });
            item.shell.addEventListener('focusout', () => {
                item.targetEnergy = 0.18;
            });

            if (item.iframe) {
                item.iframe.addEventListener('load', queueArchiveVisualizerResize, { once: true });
            }
        });

        resizeArchiveVisualizers();
        requestAnimationFrame(animateArchiveVisualizers);
        window.addEventListener('load', queueArchiveVisualizerResize);
        window.addEventListener('resize', queueArchiveVisualizerResize);

        if (window.ResizeObserver) {
            const resizeObserver = new ResizeObserver(() => {
                queueArchiveVisualizerResize();
            });

            archiveVisualizerItems.forEach((item) => {
                resizeObserver.observe(item.shell);
                resizeObserver.observe(item.embed);
            });
        }
    </script>
    <script src="home-button-loader.js" data-home-href="index.html" defer></script>
</body>
</html>
