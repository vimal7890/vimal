<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baptist World Alliance Member</title>
    <link rel="stylesheet" href="denomination-page.css">
</head>
<body>
    <div class="container">
        <a href="baptist-world-alliance.html" class="back-link">&larr; Back to Baptist World Alliance</a>
        <h1 class="page-title" id="member-title">Baptist World Alliance Member</h1>
        <section class="info-card">
            <h2 class="section-title">Intro</h2>
            <p class="loading-text" id="member-intro">Loading member intro...</p>
            <p class="source-note" id="member-source" hidden></p>
        </section>
    </div>
    <script>
        function lowerFirst(text) {
            return text ? text.charAt(0).toLowerCase() + text.slice(1) : text;
        }

        function cleanExtract(text) {
            return (text || "")
                .replace(/\[\d+\]/g, "")
                .replace(/\s+/g, " ")
                .trim();
        }

        function splitSentences(text) {
            return cleanExtract(text).split(/(?<=[.!?])\s+/).filter(Boolean);
        }

        function ensurePeriod(text) {
            return /[.!?]$/.test(text) ? text : `${text}.`;
        }

        function rewriteFirstSentence(memberName, wikiTitle, sentence) {
            const patterns = [
                [`The ${wikiTitle} is `, `Wikipedia describes ${memberName} as `],
                [`${wikiTitle} is `, `Wikipedia describes ${memberName} as `],
                [`The ${wikiTitle} was `, `Wikipedia describes ${memberName} as having been `],
                [`${wikiTitle} was `, `Wikipedia describes ${memberName} as having been `]
            ];

            for (const [prefix, replacement] of patterns) {
                if (sentence.startsWith(prefix)) {
                    return ensurePeriod(replacement + lowerFirst(sentence.slice(prefix.length)));
                }
            }

            if (memberName !== wikiTitle && sentence.startsWith(wikiTitle)) {
                return ensurePeriod(
                    `${memberName} is covered on Wikipedia as ${wikiTitle}, ${lowerFirst(sentence.slice(wikiTitle.length).replace(/^[,\s]+/, ""))}`
                );
            }

            return ensurePeriod(`Wikipedia describes ${memberName} as ${lowerFirst(sentence)}`);
        }

        function rewriteFollowUpSentence(wikiTitle, sentence) {
            let text = sentence.trim();
            if (!text) {
                return "";
            }

            if (text.startsWith(`The ${wikiTitle} `)) {
                text = `It ${text.slice(`The ${wikiTitle} `.length)}`;
            } else if (text.startsWith(`${wikiTitle} `)) {
                text = `It ${text.slice(`${wikiTitle} `.length)}`;
            } else if (text.startsWith(wikiTitle)) {
                text = "It";
            }

            return ensurePeriod(`Wikipedia also notes that ${lowerFirst(text)}`);
        }

        function paraphraseIntro(memberName, wikiTitle, extract) {
            const sentences = splitSentences(extract);
            if (!sentences.length) {
                return `${memberName} is a Baptist member body listed by the Baptist World Alliance.`;
            }

            const parts = [rewriteFirstSentence(memberName, wikiTitle, sentences[0])];
            for (const sentence of sentences.slice(1, 4)) {
                const rewritten = rewriteFollowUpSentence(wikiTitle, sentence);
                if (rewritten) {
                    parts.push(rewritten);
                }
                if (parts.join(" ").length >= 520) {
                    break;
                }
            }
            return parts.join(" ");
        }

        function buildSourceNote(container, wikiTitle, wikiUrl) {
            container.textContent = "";
            container.hidden = false;
            container.append("Source: Intro adapted from the Wikipedia article \"");

            const articleLink = document.createElement("a");
            articleLink.href = wikiUrl;
            articleLink.target = "_blank";
            articleLink.rel = "noopener noreferrer";
            articleLink.textContent = wikiTitle;
            container.append(articleLink);

            container.append("\". Licensed under ");

            const licenseLink = document.createElement("a");
            licenseLink.href = "https://creativecommons.org/licenses/by-sa/4.0/";
            licenseLink.target = "_blank";
            licenseLink.rel = "noopener noreferrer";
            licenseLink.textContent = "CC BY-SA 4.0";
            container.append(licenseLink);
            container.append(".");
        }

        async function loadMemberIntro() {
            const params = new URLSearchParams(window.location.search);
            const memberName = params.get("member");
            const wikiTitleParam = params.get("title");
            const titleEl = document.getElementById("member-title");
            const introEl = document.getElementById("member-intro");
            const sourceEl = document.getElementById("member-source");

            if (!memberName || !wikiTitleParam) {
                titleEl.textContent = "Member page unavailable";
                introEl.className = "error-text";
                introEl.textContent = "This member page is missing the information needed to load its Wikipedia intro.";
                return;
            }

            titleEl.textContent = memberName;
            document.title = memberName;

            const apiUrl = new URL("https://en.wikipedia.org/w/api.php");
            apiUrl.search = new URLSearchParams({
                action: "query",
                redirects: "1",
                prop: "extracts|info",
                exintro: "1",
                explaintext: "1",
                inprop: "url",
                titles: wikiTitleParam,
                formatversion: "2",
                format: "json",
                origin: "*"
            }).toString();

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                const page = data.query.pages[0];
                if (page.missing) {
                    throw new Error("Wikipedia page not found");
                }

                introEl.className = "intro-text";
                introEl.textContent = paraphraseIntro(memberName, page.title, page.extract || "");
                buildSourceNote(sourceEl, page.title, page.fullurl || `https://en.wikipedia.org/wiki/${encodeURIComponent(page.title.replace(/ /g, "_"))}`);
            } catch (error) {
                introEl.className = "error-text";
                introEl.textContent = "The Wikipedia intro could not be loaded for this member right now.";
            }
        }

        loadMemberIntro();
    </script>
    <script src="../home-button-loader.js" data-home-href="../index.html" defer></script>
</body>
</html>
